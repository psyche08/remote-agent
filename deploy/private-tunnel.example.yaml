# Private-tunnel integration for the AI Desktop Remote Agent.
#
# The agent listens on a local Unix domain socket by default (never a public
# port). To reach it from an iPhone, use a private-tunnel-compatible reverse
# tunnel (mTLS). Two edits, on two configs:
#
# ---------------------------------------------------------------------------
# 1) RELAY config (runs on the public relay host) — add a service.
#    Because the agent serves its OWN web UI, set default_device and DO NOT set
#    static_dir.
#    default_device makes the relay strip the /s/<svc>/ prefix and forward clean
#    paths (/status, /providers, /) to the agent, so the UI's absolute paths work.
# ---------------------------------------------------------------------------
users:
  example-user:                    # your private-tunnel user
    services:
      remotecoding:                # service name must match [a-z0-9]+ (no hyphen)
        port: 8765                 # relay route id; agent maps it to unix_targets
        default_device: mac-studio-01   # == this Mac's device id / agent cert device
        push:
          enabled: false

# ---------------------------------------------------------------------------
# 2) The edge/container profile maps route port 8765 through its private host
#    gateway to the host remote-coding UDS adapter.
# ---------------------------------------------------------------------------
# allowed_ports: [8765]
# tcp_targets:
#   8765: <host-gateway-ip>:18765
#
# Deploy with:
#   <your edge deployment command>
#
# ---------------------------------------------------------------------------
# Reach it from the phone (mTLS client cert installed in the browser):
#   single-device (default_device set):
#     https://example-user-relay.example.com/s/remotecoding/
#   explicit device form (many Macs under one service):
#     https://example-user-relay.example.com/s/remotecoding/d/<device>/
#
# Security layering: mTLS (network identity, private CA) + local Unix socket
# filesystem permissions. The Go agent does not require an app-layer bearer token.
